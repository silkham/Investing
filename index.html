<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#2F5D50" />
<link rel="manifest" href="manifest.webmanifest" />
<title>Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ---- Palette (calm morning dashboard, not a trading terminal) ---- */
  :root {
    --bg:      #FAFAF7;   /* paper */
    --surface: #FFFFFF;
    --ink:     #191C19;   /* near-black */
    --muted:   #6C7269;   /* secondary text */
    --line:    #ECEBE4;   /* hairlines */
    --accent:  #2F5D50;   /* deep muted green */
    --pos:     #2F6F4F;   /* gain */
    --neg:     #A6483C;   /* loss (muted brick, not alarm-red) */
    --warn:    #B07A2E;   /* drift / over-concentration flag */
    --radius: 14px;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    --sans: "Inter", system-ui, -apple-system, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#14171400; --bg:#121412; --surface:#1B1E1B; --ink:#EDEEEA;
      --muted:#9AA096; --line:#2A2E2A; --accent:#7FB59F;
      --pos:#7FB59F; --neg:#D68B7E; --warn:#D6AE6E;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.45;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 24px 20px 64px; }
  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .pos { color: var(--pos); }
  .neg { color: var(--neg); }
  .muted { color: var(--muted); }
  button { font-family: inherit; cursor: pointer; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }

  /* ---- Header ---- */
  header.top { display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 28px; }
  header.top h1 { font-size: 15px; font-weight: 600; letter-spacing: .02em; margin:0; }
  .stamp { font-size: 12px; }
  .stamp button {
    background:none; border:1px solid var(--line); color:var(--muted);
    border-radius: 999px; padding: 3px 10px; font-size: 12px;
  }

  /* ---- Summary tiles ---- */
  .summary { display:grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--line);
             border:1px solid var(--line); border-radius: var(--radius); overflow:hidden; margin-bottom: 32px; }
  @media (min-width: 620px){ .summary { grid-template-columns: repeat(4, 1fr); } }
  .tile { background: var(--surface); padding: 18px 18px 16px; }
  .tile .k { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .tile .v { font-size: 22px; font-weight: 600; }

  /* ---- Section ---- */
  section { margin-bottom: 40px; }
  section h2 { font-size: 13px; font-weight:600; text-transform: uppercase;
                 letter-spacing:.06em; color: var(--muted); margin: 0 0 14px; }
  .sec-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .sec-head h2 { margin:0; }
  .editbtn { background:none; border:1px solid var(--line); color:var(--muted);
             border-radius:999px; padding:3px 11px; font-size:12px; }
  .editbtn:hover { color:var(--ink); border-color:var(--muted); }

  /* ---- Holdings table ---- */
  .holdings { width:100%; border-collapse: collapse; }
  .holdings th { text-align:right; font-size:11px; font-weight:600; color:var(--muted);
                 text-transform:uppercase; letter-spacing:.05em; padding:0 0 10px; }
  .holdings th:first-child, .holdings td:first-child { text-align:left; }
  .holdings td { padding: 12px 0; border-top: 1px solid var(--line); text-align:right; font-size:14px; }
  .holdings td.tk { font-weight:600; }
  .holdings td .sub { display:block; font-size:12px; color:var(--muted); font-weight:400; }
  .holdings td.tk .ccy { margin-left:6px; padding:1px 5px; border:1px solid var(--line); border-radius:5px;
                         font-size:10px; font-weight:600; color:var(--muted); vertical-align:1px; }
  .fxnote { font-size:12px; margin-top:10px; }

  /* ---- Allocation rails (signature element) ---- */
  .rail-row { margin-bottom: 18px; }
  .rail-head { display:flex; justify-content:space-between; font-size:13px; margin-bottom:7px; }
  .rail-head .lbl { font-weight:500; }
  .rail { position:relative; height:8px; background:var(--line); border-radius:999px; }
  .rail .fill { position:absolute; left:0; top:0; bottom:0; border-radius:999px; background:var(--accent); }
  .rail .fill.over { background: var(--warn); }
  .rail .target { position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--ink); opacity:.55; }
  .flag { display:inline-block; margin-top:6px; font-size:12px; color:var(--warn); }

  /* ---- Cards / states ---- */
  .card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:22px; }
  .empty { color:var(--muted); font-size:14px; }
  .banner { background:var(--surface); border:1px solid var(--line); border-left:3px solid var(--warn);
            border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:20px; color:var(--muted); }

  /* ---- Auth ---- */
  .auth { min-height: 80vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
  .auth form { display:flex; flex-direction:column; gap:10px; width:min(320px, 90vw); }
  .auth input { font:inherit; padding:11px 13px; border:1px solid var(--line); border-radius:10px;
                background:var(--surface); color:var(--ink); }
  .auth button { padding:11px; border:none; border-radius:10px; background:var(--accent); color:#fff; font-weight:600; }
  .auth .err { color:var(--neg); font-size:13px; min-height: 1em; }
  .brand { font-size:20px; font-weight:700; letter-spacing:-.01em; }

  /* ---- Thesis affordances on holdings ---- */
  .holdings tr.clickable { cursor:pointer; }
  .holdings tr.clickable:hover td { background: color-mix(in srgb, var(--accent) 5%, transparent); }
  .chip { display:inline-block; margin-left:6px; padding:1px 7px; border-radius:999px;
          font-size:10px; font-weight:600; letter-spacing:.03em; text-transform:uppercase; vertical-align:1px; }
  .chip.core      { background: color-mix(in srgb, var(--accent) 15%, transparent); color:var(--accent); }
  .chip.satellite { background: color-mix(in srgb, var(--warn) 18%, transparent);   color:var(--warn); }
  .chip.fun       { background: color-mix(in srgb, var(--muted) 18%, transparent);  color:var(--muted); }
  .thesis-dot { margin-left:6px; color:var(--accent); font-size:10px; vertical-align:1px; }
  .addnote { margin-left:6px; color:var(--muted); font-size:11px; opacity:.65; font-weight:400; }

  /* ---- Modal ---- */
  .overlay { position:fixed; inset:0; background:rgba(20,23,20,.42); z-index:50;
             display:flex; align-items:flex-end; justify-content:center; padding:0; }
  @media (min-width:620px){ .overlay { align-items:center; padding:20px; } }
  .dialog { background:var(--surface); border:1px solid var(--line);
            border-radius:16px 16px 0 0; width:min(460px,100%); max-height:92vh; overflow:auto;
            padding:22px; box-shadow:0 12px 40px rgba(0,0,0,.22); }
  @media (min-width:620px){ .dialog { border-radius:16px; } }
  .dialog h3 { margin:0 0 4px; font-size:17px; font-weight:600; }
  .dialog .hint { color:var(--muted); font-size:12.5px; margin:0 0 18px; line-height:1.5; }
  .field { margin-bottom:16px; }
  .field > label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; font-weight:500; }
  .field input[type=number], .field textarea {
    width:100%; font:inherit; padding:10px 12px; border:1px solid var(--line);
    border-radius:10px; background:var(--bg); color:var(--ink); }
  .field textarea { resize:vertical; min-height:66px; line-height:1.5; }
  .field .sub { font-size:11px; color:var(--muted); margin-top:5px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .seg { display:flex; gap:6px; }
  .seg button { flex:1; padding:8px 4px; border:1px solid var(--line); border-radius:9px;
                background:var(--bg); color:var(--muted); font-size:13px; font-weight:500; }
  .seg button.on { border-color:var(--accent); color:var(--accent);
                   background:color-mix(in srgb, var(--accent) 9%, transparent); }
  .seg button:disabled { opacity:.5; cursor:default; }
  .dialog-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:8px; }
  .btn-primary { padding:10px 18px; border:none; border-radius:10px; background:var(--accent);
                 color:#fff; font-weight:600; font-size:14px; }
  .btn-primary:disabled { opacity:.6; }
  .btn-ghost { padding:10px 16px; border:1px solid var(--line); border-radius:10px;
               background:none; color:var(--muted); font-size:14px; }
</style>
</head>
<body>
<div class="wrap" id="app"><!-- rendered by JS --></div>
<div id="modalHost"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

// ============================================================================
// CONFIG — placeholders. Fill from the `realestate` Supabase project settings.
// The anon key is public-safe (RLS enforces access); it is NOT a secret.
// See SETUP.md.
// ============================================================================
const SUPABASE_URL = "https://wqkhjbmsciuhwdqsdsni.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indxa2hqYm1zY2l1aHdkcXNkc25pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NzkzMTMsImV4cCI6MjA5NzU1NTMxM30.cAWtGGE42k_GeSQRE1ZnFZIXK2EOat35-xnaF2Gczsc";

const CONFIGURED = !SUPABASE_URL.startsWith("__");
const sb = CONFIGURED ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

const app = document.getElementById("app");
const fmtGBP = (n) => (n == null || isNaN(n)) ? "—" :
  new Intl.NumberFormat("en-GB", { style:"currency", currency:"GBP", maximumFractionDigits:0 }).format(n);
const fmtPct = (n) => (n == null || isNaN(n)) ? "—" : `${n.toFixed(1)}%`;
const signed = (n) => (n == null || isNaN(n)) ? "—" :
  (n >= 0 ? "+" : "−") + fmtGBP(Math.abs(n)).replace("£","£");
const timeHHMM = (iso) => { try { return new Date(iso).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}); } catch { return "—"; } };
const esc = (s) => (s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ---- App state ----
const state = { session:null, summary:null, positions:[], settings:null, theses:{},
                instruments:{}, fx:{}, fxDate:null, stamp:null, offline:!navigator.onLine };
window.addEventListener("online",  () => { state.offline=false; render(); });
window.addEventListener("offline", () => { state.offline=true;  render(); });

// ============================================================================
// Data layer
// ============================================================================
async function loadDiscipline() {
  if (!sb || !state.session) return;
  const uid = state.session.user.id;
  const [{ data: settings }, { data: theses }] = await Promise.all([
    sb.from("inv_settings").select("*").eq("user_id", uid).maybeSingle(),
    sb.from("inv_theses").select("ticker, sleeve, thesis, prove_me_wrong").eq("user_id", uid),
  ]);
  state.settings = settings ?? { core_min_pct:50, satellite_max_pct:25, fun_max_pct:5, per_name_cap_pct:10 };
  state.theses = Object.fromEntries((theses ?? []).map(t => [t.ticker, t]));
}

async function loadPortfolio() {
  if (!sb || !state.session) return;
  // T212 (value/positions/currency) + FX rates in parallel.
  const [t212, fx] = await Promise.all([
    sb.functions.invoke("t212-proxy", { body: { want:["summary","positions","instruments"] } }),
    sb.functions.invoke("fx-proxy", { body: {} }),
  ]);
  // FX first, so normalizePositions() can convert to GBP.
  if (fx.error) console.warn("fx-proxy:", fx.error.message);
  if (fx.data?.rates) { state.fx = fx.data.rates; state.fxDate = fx.data.date; }

  const d = t212.data;
  if (t212.error) { console.warn("t212-proxy:", t212.error.message); return; }
  if (d?.instruments?.data) state.instruments = d.instruments.data;
  if (d?.summary?.data)   { state.summary   = d.summary.data;  state.stamp = d.summary.fetched_at; }
  if (d?.positions?.data) { state.positions = normalizePositions(d.positions.data); }
  publishToLifeOS();  // fire-and-forget: mirror the portfolio total into lifeos.signals
}

// ============================================================================
// LifeOS integration — publish the portfolio total as a `metric` signal.
// LifeOS is the read-only cross-app hub: it reads this row via its own second
// Supabase client (this project is the outlier on its own DB) and renders it.
// We ONLY ever write here; LifeOS owns rendering. Fire-and-forget so a failure
// (offline, no session, table missing) never blocks or breaks the dashboard.
// Shared "Our household" id — cosmetic on this DB (no household_memberships), but
// kept consistent with the other apps' signals for a clean merge.
// ============================================================================
const LIFEOS_HOUSEHOLD = "13b5e642-3f21-403c-8336-56976f177269";
async function publishToLifeOS() {
  try {
    if (!sb || !state.session) return;
    const s = state.summary;
    const total = s?.total ?? s?.value ?? null;
    if (total == null) return;                       // nothing meaningful to publish yet
    const ppl = s?.ppl ?? s?.result ?? null;         // unrealised P/L, already in GBP
    const up = (ppl ?? 0) >= 0;
    const detail = ppl == null ? null
      : `${up ? "+" : "−"}£${Math.abs(ppl).toLocaleString("en-GB", { maximumFractionDigits: 0 })} P/L`;
    const CTA = "https://silkham.github.io/Investing/";
    const portfolio = {
      household_id: LIFEOS_HOUSEHOLD,
      app: "invest",
      kind: "metric",
      key: "portfolio",                              // stable → upsert, never duplicates
      title: "Portfolio",
      detail,
      value: total,
      unit: "gbp",
      state: up ? "good" : "bad",                    // up = good for a portfolio
      cta_url: CTA,
      cta_label: "Open",
      status: "open",
    };

    // Per-holding rows — LifeOS renders these grouped under the portfolio tile.
    // key='holding-<ticker>'; state good/bad by unrealised P/L (up = good).
    const holdKey = (tk) => "holding-" + String(tk).toLowerCase().replace(/[^a-z0-9]+/g, "-");
    const holdings = (state.positions || [])
      .filter((p) => p.value != null)
      .map((p) => {
        const gain = (p.ppl ?? 0) >= 0;
        return {
          household_id: LIFEOS_HOUSEHOLD, app: "invest", kind: "metric",
          key: holdKey(p.ticker), title: p.name || p.ticker,
          detail: p.ppl == null ? null
            : `${gain ? "+" : "−"}£${Math.abs(p.ppl).toLocaleString("en-GB", { maximumFractionDigits: 0 })} P/L`,
          value: p.value, unit: "gbp",
          state: gain ? "good" : "bad",
          cta_url: CTA, cta_label: "Open", status: "open",
        };
      });

    await sb.schema("lifeos").from("signals")
      .upsert([portfolio, ...holdings], { onConflict: "household_id,app,key" });

    // Self-cleaning: a sold holding's row would otherwise linger forever. Dismiss
    // any published `holding-*` rows we're no longer holding (LifeOS filters
    // `status='dismissed'`, so they vanish from the hub). Update-in-place — the
    // rows already exist, so no NOT NULL insert path.
    const live = new Set(holdings.map((h) => h.key));
    const { data: existing } = await sb.schema("lifeos").from("signals")
      .select("key").eq("household_id", LIFEOS_HOUSEHOLD).eq("app", "invest")
      .like("key", "holding-%").neq("status", "dismissed");
    const stale = (existing || []).map((r) => r.key).filter((k) => !live.has(k));
    if (stale.length) {
      await sb.schema("lifeos").from("signals")
        .update({ status: "dismissed" })
        .eq("household_id", LIFEOS_HOUSEHOLD).eq("app", "invest").in("key", stale);
    }
  } catch (e) {
    console.warn("publishToLifeOS:", e?.message || e);
  }
}

// Convert an amount in `ccy` to GBP using ECB rates (base GBP: 1 GBP = rate·ccy).
// Falls back to the native amount if the currency/rate is unknown, so a failed
// FX load degrades gracefully rather than blanking every foreign holding.
function toGBP(amount, ccy) {
  if (amount == null) return null;
  if (!ccy || ccy === "GBP") return amount;
  if (ccy === "GBX" || ccy === "GBp") return amount / 100; // pence → pounds
  const rate = state.fx?.[ccy];
  return rate ? amount / rate : amount;
}

// Instrument metadata is { ticker: { ccy, name, sym } }. Kept backward-compatible
// with the old { ticker: "USD" } string shape during a proxy redeploy.
function instrMeta(ticker) {
  const m = state.instruments[ticker];
  if (m == null) return { ccy: null };
  return typeof m === "string" ? { ccy: m } : m;
}

// Human-friendly label for a raw T212 ticker (e.g. FB_US_EQ → "Meta Platforms").
// Prefer the authoritative T212 instrument name; otherwise strip the T212 suffix
// (_US_EQ / _EQ / _l_EQ …) so it at least reads as a plain symbol, not raw noise.
function prettyName(ticker) {
  const name = instrMeta(ticker).name;
  if (name && name.trim()) return name.trim();
  return String(ticker).replace(/_[A-Za-z]{1,3}_EQ$/, "").replace(/_EQ$/, "");
}

// Defensive: T212 field names vary; map what we find. Prices/avg are in each
// instrument's NATIVE currency (from the instruments map) → convert to GBP.
function normalizePositions(raw) {
  const arr = Array.isArray(raw) ? raw : (raw?.positions ?? []);
  return arr.map(p => {
    const ticker = p.ticker ?? p.instrument ?? "—";
    const qty = p.quantity ?? p.qty ?? 0;
    const price = p.currentPrice ?? p.price ?? null;
    const avg = p.averagePrice ?? p.avgPrice ?? null;
    const meta = instrMeta(ticker);
    const ccy = meta.ccy ?? null;
    const foreign = !!ccy && ccy !== "GBP" && ccy !== "GBX" && ccy !== "GBp";
    return {
      ticker,
      name: prettyName(ticker),
      sym: meta.sym ?? null,
      qty,
      ccy,
      foreign,
      avg: toGBP(avg, ccy),
      price: toGBP(price, ccy),
      value: price != null ? toGBP(qty * price, ccy) : null,
      ppl: p.ppl ?? p.unrealisedPnl ?? null, // already in GBP (account currency)
    };
  });
}

// ---- Allocation model: sleeve breakdown + concentration ----
function sleeveOf(ticker) {
  if (/^VWRP/i.test(ticker)) return "core";           // global tracker
  return state.theses[ticker]?.sleeve ?? "satellite"; // default unclassified → satellite
}
function allocation() {
  const total = state.positions.reduce((s,p) => s + (p.value ?? 0), 0);
  const sleeves = { core:0, satellite:0, fun:0 };
  const byName = [];
  for (const p of state.positions) {
    const s = sleeveOf(p.ticker);
    sleeves[s] = (sleeves[s] ?? 0) + (p.value ?? 0);
    if (p.value) byName.push({ ticker:p.ticker, pct: total ? p.value/total*100 : 0 });
  }
  const pct = (v) => total ? v/total*100 : 0;
  return { total, pct: { core:pct(sleeves.core), satellite:pct(sleeves.satellite), fun:pct(sleeves.fun) }, byName };
}

// ============================================================================
// Render
// ============================================================================
function render() {
  if (!CONFIGURED) return renderNeedsConfig();
  if (!state.session) return renderAuth();
  renderDashboard();
}

function renderNeedsConfig() {
  app.innerHTML = `
    <div class="auth">
      <div class="brand">Portfolio</div>
      <div class="card empty" style="max-width:420px;text-align:center">
        Not configured yet. Add your Supabase URL and anon key to <b>index.html</b>
        (see <b>SETUP.md</b>), then reload.
      </div>
    </div>`;
}

function renderAuth() {
  app.innerHTML = `
    <div class="auth">
      <div class="brand">Portfolio</div>
      <div class="muted" style="font-size:13px">Sign in to your dashboard</div>
      <form id="loginForm">
        <input id="email" type="email" placeholder="Email" autocomplete="username" required />
        <input id="password" type="password" placeholder="Password" autocomplete="current-password" required />
        <button type="submit">Sign in</button>
        <div class="err" id="authErr"></div>
      </form>
    </div>`;
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const err = document.getElementById("authErr");
    err.textContent = "";
    const { error } = await sb.auth.signInWithPassword({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value,
    });
    if (error) err.textContent = error.message;
  });
}

function renderDashboard() {
  const s = state.summary ?? {};
  const total = s.total ?? s.value ?? null;
  const invested = s.invested ?? s.pieCash ?? null;
  const cash = s.free ?? s.cash ?? null;
  const ppl = s.ppl ?? s.result ?? null;

  const consensusCaveat = ""; // reserved for v0.3 research panels

  app.innerHTML = `
    <header class="top">
      <h1>PORTFOLIO</h1>
      <div class="stamp">
        <button id="refreshBtn" title="Refresh">
          ${state.offline ? "Offline · " : ""}Updated ${state.stamp ? timeHHMM(state.stamp) : "—"} ↻
        </button>
      </div>
    </header>

    ${state.offline ? `<div class="banner">You're offline. Showing the last cached data.</div>` : ""}

    <div class="summary">
      <div class="tile"><div class="k">Total value</div><div class="v num">${fmtGBP(total)}</div></div>
      <div class="tile"><div class="k">Invested</div><div class="v num">${fmtGBP(invested)}</div></div>
      <div class="tile"><div class="k">Cash</div><div class="v num">${fmtGBP(cash)}</div></div>
      <div class="tile"><div class="k">Unrealised P/L</div>
        <div class="v num ${ppl>=0?'pos':'neg'}">${signed(ppl)}</div></div>
    </div>

    <section>
      <h2>Holdings</h2>
      ${renderHoldings()}
    </section>

    <section>
      <div class="sec-head">
        <h2>Allocation &amp; drift</h2>
        ${state.positions.length ? `<button class="editbtn" id="editTargets">Edit targets</button>` : ""}
      </div>
      ${renderAllocation()}
    </section>
  `;
  document.getElementById("refreshBtn").addEventListener("click", refresh);
  const et = document.getElementById("editTargets");
  if (et) et.addEventListener("click", openTargetsModal);
  app.querySelectorAll("tr[data-ticker]").forEach(tr => {
    const open = () => openThesisModal(tr.dataset.ticker);
    tr.addEventListener("click", open);
    tr.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); } });
  });
}

function renderHoldings() {
  if (!state.positions.length) {
    return `<div class="card empty">No positions yet. Once the T212 proxy is wired, your ISA
            holdings appear here automatically — no manual entry.</div>`;
  }
  const rows = state.positions.map(p => {
    const sleeve = sleeveOf(p.ticker);
    const th = state.theses[p.ticker];
    const hasThesis = !!(th && (th.thesis || th.prove_me_wrong));
    const chip = `<span class="chip ${sleeve}">${sleeve}</span>`;
    const note = hasThesis
      ? `<span class="thesis-dot" title="Thesis recorded">●</span>`
      : `<span class="addnote">+ note</span>`;
    return `
    <tr class="clickable" data-ticker="${esc(p.ticker)}" tabindex="0" role="button" aria-label="Edit thesis for ${esc(p.name)}">
      <td class="tk">${esc(p.name)}${p.foreign?`<span class="ccy">${p.ccy}</span>`:""}${chip}${note}<span class="sub">${esc(p.sym || p.ticker)} · ${p.qty} @ ${p.avg!=null?fmtGBP(p.avg):"—"}</span></td>
      <td class="num">${fmtGBP(p.value)}</td>
      <td class="num ${p.ppl>=0?'pos':'neg'}">${signed(p.ppl)}</td>
    </tr>`; }).join("");
  const anyForeign = state.positions.some(p => p.foreign);
  const fxNote = anyForeign
    ? `<div class="muted fxnote">Foreign holdings converted to GBP at ECB reference rates${state.fxDate?` (${state.fxDate})`:""}.</div>`
    : "";
  return `
    <table class="holdings">
      <thead><tr><th>Holding</th><th>Value</th><th>Unrealised P/L</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>${fxNote}`;
}

function renderAllocation() {
  if (!state.positions.length) {
    return `<div class="card empty">Set your targets and add holdings to see drift against
            your core / satellite / fun sleeves.</div>`;
  }
  const a = allocation();
  const t = state.settings;
  const rails = [
    { key:"core",      label:"Core (global tracker)", actual:a.pct.core,      target:t.core_min_pct,      kind:"floor" },
    { key:"satellite", label:"Satellite (researched)", actual:a.pct.satellite, target:t.satellite_max_pct, kind:"cap" },
    { key:"fun",       label:"Fun (can lose)",         actual:a.pct.fun,       target:t.fun_max_pct,       kind:"cap" },
  ];
  const railHTML = rails.map(r => {
    const over = r.kind==="cap"  && r.actual > r.target + 0.05;
    const under = r.kind==="floor" && r.actual < r.target - 0.05;
    const breach = over || under;
    const fillW = Math.min(100, r.actual);
    const flag = over ? `Over its ${fmtPct(r.target)} cap`
               : under ? `Below its ${fmtPct(r.target)} floor` : "";
    return `
      <div class="rail-row">
        <div class="rail-head">
          <span class="lbl">${r.label}</span>
          <span class="num muted">${fmtPct(r.actual)} <span style="opacity:.6">/ ${r.kind==='cap'?'≤':'≥'} ${fmtPct(r.target)}</span></span>
        </div>
        <div class="rail">
          <div class="fill ${breach?'over':''}" style="width:${fillW}%"></div>
          <div class="target" style="left:${Math.min(100,r.target)}%"></div>
        </div>
        ${flag ? `<span class="flag">⚑ ${flag}</span>` : ""}
      </div>`;
  }).join("");

  // Per-name over-concentration
  const cap = t.per_name_cap_pct;
  const hot = a.byName.filter(n => n.pct > cap + 0.05).sort((x,y)=>y.pct-x.pct);
  const concentration = hot.length
    ? `<div class="flag" style="display:block;margin-top:14px">⚑ Over the ${fmtPct(cap)} per-name cap:
       ${hot.map(h=>`${esc(prettyName(h.ticker))} (${fmtPct(h.pct)})`).join(", ")}</div>`
    : "";

  return railHTML + concentration;
}

// ============================================================================
// Modals — editable targets + per-holding thesis (the discipline layer)
// ============================================================================
function escClose(e){ if (e.key === "Escape") closeModal(); }
function closeModal(){
  const h = document.getElementById("modalHost");
  if (h) h.innerHTML = "";
  document.removeEventListener("keydown", escClose);
}
function openModal(html){
  const h = document.getElementById("modalHost");
  h.innerHTML = `<div class="overlay" id="ov">${html}</div>`;
  document.getElementById("ov").addEventListener("mousedown", e => { if (e.target.id === "ov") closeModal(); });
  document.addEventListener("keydown", escClose);
}

function openTargetsModal(){
  const t = state.settings ?? { core_min_pct:50, satellite_max_pct:25, fun_max_pct:5, per_name_cap_pct:10 };
  openModal(`
    <div class="dialog" role="dialog" aria-modal="true" aria-label="Edit allocation targets">
      <h3>Allocation targets</h3>
      <p class="hint">Your discipline rails, as a percent of total value. Drift against these
        is flagged, not acted on — you trade in T212.</p>
      <div class="grid2">
        <div class="field"><label for="t_core">Core floor ≥ (%)</label>
          <input type="number" id="t_core" min="0" max="100" step="1" value="${t.core_min_pct}">
          <div class="sub">Global tracker minimum</div></div>
        <div class="field"><label for="t_sat">Satellite cap ≤ (%)</label>
          <input type="number" id="t_sat" min="0" max="100" step="1" value="${t.satellite_max_pct}">
          <div class="sub">Researched sleeve</div></div>
        <div class="field"><label for="t_fun">Fun cap ≤ (%)</label>
          <input type="number" id="t_fun" min="0" max="100" step="1" value="${t.fun_max_pct}">
          <div class="sub">Money you can lose</div></div>
        <div class="field"><label for="t_name">Per-name cap ≤ (%)</label>
          <input type="number" id="t_name" min="0" max="100" step="1" value="${t.per_name_cap_pct}">
          <div class="sub">Single-position ceiling</div></div>
      </div>
      <div class="dialog-actions">
        <button class="btn-ghost" id="t_cancel">Cancel</button>
        <button class="btn-primary" id="t_save">Save targets</button>
      </div>
    </div>`);
  document.getElementById("t_cancel").addEventListener("click", closeModal);
  document.getElementById("t_save").addEventListener("click", saveTargets);
}
async function saveTargets(){
  const num = id => { const v = parseFloat(document.getElementById(id).value); return isNaN(v) ? 0 : Math.max(0, Math.min(100, v)); };
  const btn = document.getElementById("t_save"); btn.disabled = true; btn.textContent = "Saving…";
  const row = {
    user_id: state.session.user.id,
    core_min_pct: num("t_core"), satellite_max_pct: num("t_sat"),
    fun_max_pct: num("t_fun"), per_name_cap_pct: num("t_name"),
    updated_at: new Date().toISOString(),
  };
  const { error } = await sb.from("inv_settings").upsert(row);
  if (error) { btn.disabled = false; btn.textContent = "Save targets"; alert("Couldn't save targets: " + error.message); return; }
  state.settings = row;
  closeModal(); render();
}

function openThesisModal(ticker){
  const t = state.theses[ticker] ?? {};
  const locked = /^VWRP/i.test(ticker);              // core tracker is fixed
  const sleeve = locked ? "core" : (t.sleeve ?? "satellite");
  openModal(`
    <div class="dialog" role="dialog" aria-modal="true" aria-label="Edit thesis for ${esc(prettyName(ticker))}">
      <h3>${esc(prettyName(ticker))}<span class="sub" style="display:block;font-size:12px;color:var(--muted);font-weight:400">${esc(ticker)}</span></h3>
      <p class="hint">Why you own it — and the concrete thing that would tell you you're wrong.
        Written once, surfaced here and again before you consider selling.</p>
      <div class="field">
        <label>Sleeve</label>
        <div class="seg" id="seg">
          ${["core","satellite","fun"].map(s =>
            `<button type="button" data-sleeve="${s}" class="${s===sleeve?"on":""}"${locked?" disabled":""}>${s[0].toUpperCase()+s.slice(1)}</button>`).join("")}
        </div>
        ${locked ? `<div class="sub">VWRP is always your core holding.</div>` : ""}
      </div>
      <div class="field">
        <label for="th_thesis">Thesis</label>
        <textarea id="th_thesis" placeholder="In a sentence or two: why does this belong in the portfolio?">${esc(t.thesis)}</textarea>
      </div>
      <div class="field">
        <label for="th_wrong">What would prove me wrong</label>
        <textarea id="th_wrong" placeholder="The specific thing that would break the thesis and mean it's time to exit.">${esc(t.prove_me_wrong)}</textarea>
      </div>
      <div class="dialog-actions">
        <button class="btn-ghost" id="th_cancel">Cancel</button>
        <button class="btn-primary" id="th_save">Save</button>
      </div>
    </div>`);
  let chosen = sleeve;
  document.querySelectorAll("#seg button").forEach(b => b.addEventListener("click", () => {
    if (b.disabled) return;
    chosen = b.dataset.sleeve;
    document.querySelectorAll("#seg button").forEach(x => x.classList.toggle("on", x === b));
  }));
  document.getElementById("th_cancel").addEventListener("click", closeModal);
  document.getElementById("th_save").addEventListener("click", () => saveThesis(ticker, () => chosen));
}
async function saveThesis(ticker, getSleeve){
  const btn = document.getElementById("th_save"); btn.disabled = true; btn.textContent = "Saving…";
  const row = {
    user_id: state.session.user.id, ticker,
    sleeve: getSleeve(),
    thesis: document.getElementById("th_thesis").value.trim() || null,
    prove_me_wrong: document.getElementById("th_wrong").value.trim() || null,
    updated_at: new Date().toISOString(),
  };
  const { error } = await sb.from("inv_theses").upsert(row, { onConflict: "user_id,ticker" });
  if (error) { btn.disabled = false; btn.textContent = "Save"; alert("Couldn't save thesis: " + error.message); return; }
  state.theses[ticker] = row;
  closeModal(); render();
}

// ============================================================================
// Actions
// ============================================================================
async function refresh() {
  const btn = document.getElementById("refreshBtn");
  if (btn) btn.disabled = true;
  await loadPortfolio();
  render();
}

async function boot() {
  render(); // config / auth check first
  if (!CONFIGURED) return;

  const { data: { session } } = await sb.auth.getSession();
  state.session = session;
  sb.auth.onAuthStateChange((_e, sess) => { state.session = sess; init(); });
  init();
}

async function init() {
  render();
  if (!state.session) return;
  await loadDiscipline();
  render();
  await loadPortfolio();
  render();
}

boot();
</script>
